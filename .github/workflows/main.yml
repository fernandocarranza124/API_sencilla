name : Pipeline para revisar archivo

on:
    push:
        branches : ["main"]

jobs:
    build:
        runs-on : ubuntu-latest

        steps:
            
            

            - name: Checkout del código
              uses: actions/checkout@v4

            - name: Verificar si app.js existe
              run: |
                if [ ! -f "$GITHUB_WORKSPACE/app.js" ]; then
                    echo "❌ No se encontró app.js en la raíz."
                    exit 1
                fi
                echo "✅ Se encontró app.js. Continuando con el workflow..."
                    

            - name: Usar NODE JS
              uses: actions/setup-node@v4
              with:
                node-version: '20'
            
            - name: Construir app con node
              run: npm install 
            

            - name: Dar permisos a jest
              run: chmod +x ./node_modules/.bin/jest

            - name: Ejecutar pruebas a función raiz(/)
              run: npm test

            - name: Preparar llave SSH
              run: |
                mkdir -p ~/.ssh
                echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
                chmod 600 ~/.ssh/vps_key
                ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
            
            - name: Deploy en VPS
              run: |
                ssh -i ~/.ssh/vps_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
                    cd ${{ secrets.VPS_APP_PATH }}
                    git pull origin main
                    npm install
                    pm2 restart ci-cd-demo || pm2 start server.js --name ci-cd-demo
                    pm2 save
                EOF

name : Pipeline para revisar archivo

on:
    push:
        branches : ["main"]

jobs:
    build:
        runs-on : ubuntu-latest

        steps:
            
            

            - name: Checkout del código
              uses: actions/checkout@v4

            - name: Verificar si app.js existe
              run: |
                if [ ! -f "$GITHUB_WORKSPACE/app.js" ]; then
                    echo "❌ No se encontró app.js en la raíz."
                    exit 1
                fi
                echo "✅ Se encontró app.js. Continuando con el workflow..."
                    

            - name: Usar NODE JS
              uses: actions/setup-node@v4
              with:
                node-version: '20'
            
            - name: Construir app con node
              run: npm install 
            

            
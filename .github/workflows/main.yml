name : Pipeline para revisar archivo

on:
    push:
        branches : ["main"]

jobs:
    build:
        runs-on : ubuntu-latest

        steps:
            - name: Checkout del código
              uses: actions/checkout@v4
              
            - name: Usar NODE JS
              uses: actions/setup-node@v4
              with:
                node-version: '20'
            
            - name: Construir app con node
              run: npm install 
